openapi: 3.0.3
info:
  title: WS2026 API
  version: 1.0.0
  description: Dokumentasi REST API untuk praktikum Web Service WS2026.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Health check service
      responses:
        "200":
          description: Service berjalan normal
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: ws2026-api
  /architecture/services:
    get:
      summary: Lihat boundary service untuk arsitektur microservice-ready
      responses:
        "200":
          description: Ringkasan gateway dan service boundary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureOverviewResponse"
  /api/v1/books:
    get:
      summary: Ambil daftar buku
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Daftar buku berhasil diambil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"
    post:
      summary: Tambah buku baru
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "201":
          description: Buku berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "400":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/books/{id}:
    get:
      summary: Ambil detail buku
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detail buku berhasil diambil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "404":
          description: Buku tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Ubah data buku
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "200":
          description: Buku berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "400":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Buku tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Hapus buku
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Buku berhasil dihapus
        "404":
          description: Buku tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/login:
    post:
      summary: Login untuk mendapatkan JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Request login tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Kredensial salah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /services/identity/health:
    get:
      summary: Health check untuk identity service
      responses:
        "200":
          description: Identity service berjalan normal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceHealth"
  /services/identity/login:
    post:
      summary: Login langsung ke identity service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Request login tidak valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Kredensial salah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /services/catalog/health:
    get:
      summary: Health check untuk catalog service
      responses:
        "200":
          description: Catalog service berjalan normal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceHealth"
  /services/catalog/stats:
    get:
      summary: Statistik katalog buku
      responses:
        "200":
          description: Statistik katalog berhasil diambil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogStatsResponse"
  /services/events/health:
    get:
      summary: Health check untuk message broker
      responses:
        "200":
          description: Status broker event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageBrokerHealthResponse"
  /services/grpc/health:
    get:
      summary: Health check untuk catalog RPC service
      responses:
        "200":
          description: Status gRPC server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrpcHealthResponse"
  /services/grpc/books/{id}/summary:
    get:
      summary: Ambil ringkasan buku lewat gRPC call
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ringkasan buku berhasil diambil lewat gRPC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookSummaryResponse"
        "404":
          description: Buku tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /services/catalog/books:
    get:
      summary: Ambil daftar buku dari catalog service
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Daftar buku berhasil diambil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"
    post:
      summary: Tambah buku lewat catalog service
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "201":
          description: Buku berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "400":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /services/catalog/books/{id}:
    get:
      summary: Ambil detail buku dari catalog service
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detail buku berhasil diambil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "404":
          description: Buku tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Ubah data buku lewat catalog service
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "200":
          description: Buku berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "400":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Buku tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Hapus buku lewat catalog service
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Buku berhasil dihapus
        "404":
          description: Buku tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /services/notifications/health:
    get:
      summary: Health check untuk notification service
      responses:
        "200":
          description: Notification service berjalan normal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceHealth"
  /services/notifications/events:
    get:
      summary: Lihat event yang sudah dikonsumsi notification service
      responses:
        "200":
          description: Daftar event yang sudah diproses consumer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationEventListResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    Book:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: string
        year:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - author
        - year
        - createdAt
    BookInput:
      type: object
      properties:
        title:
          type: string
          minLength: 3
        author:
          type: string
          minLength: 3
        year:
          type: integer
          minimum: 1900
      required:
        - title
        - author
        - year
    BookResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Book"
      required:
        - data
    BookListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
          required:
            - page
            - limit
            - total
      required:
        - data
        - meta
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
      required:
        - error
    ServiceHealth:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
        boundedContext:
          type: string
      required:
        - status
        - service
        - boundedContext
    CatalogStats:
      type: object
      properties:
        totalBooks:
          type: integer
        latestBook:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Book"
      required:
        - totalBooks
        - latestBook
    CatalogStatsResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/CatalogStats"
      required:
        - data
    ServiceDescriptor:
      type: object
      properties:
        name:
          type: string
        kind:
          type: string
          example: domain-service
        basePath:
          type: string
        healthPath:
          type: string
        responsibilities:
          type: array
          items:
            type: string
        integrations:
          type: array
          items:
            type: string
      required:
        - name
        - kind
        - basePath
        - healthPath
        - responsibilities
        - integrations
    ArchitectureOverviewResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            style:
              type: string
            gateway:
              type: object
              properties:
                name:
                  type: string
                publicRoutes:
                  type: array
                  items:
                    type: string
              required:
                - name
                - publicRoutes
            services:
              type: array
              items:
                $ref: "#/components/schemas/ServiceDescriptor"
            dataFlow:
              type: array
              items:
                type: string
            currentState:
              type: object
              properties:
                catalogStats:
                  $ref: "#/components/schemas/CatalogStats"
                identityHealth:
                  $ref: "#/components/schemas/ServiceHealth"
                catalogHealth:
                  $ref: "#/components/schemas/ServiceHealth"
                notificationHealth:
                  $ref: "#/components/schemas/ServiceHealth"
                messageBroker:
                  $ref: "#/components/schemas/MessageBrokerHealth"
                grpcHealth:
                  $ref: "#/components/schemas/GrpcHealth"
              required:
                - catalogStats
                - identityHealth
                - catalogHealth
                - notificationHealth
                - messageBroker
                - grpcHealth
          required:
            - style
            - gateway
            - services
            - dataFlow
            - currentState
      required:
        - data
    GrpcHealth:
      type: object
      properties:
        status:
          type: string
          example: listening
        port:
          type: integer
        service:
          type: string
        protoPath:
          type: string
      required:
        - status
        - port
        - service
        - protoPath
    GrpcHealthResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/GrpcHealth"
      required:
        - data
    BookSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: string
        year:
          type: integer
        createdAt:
          type: string
          format: date-time
        summary:
          type: string
        servedBy:
          type: string
      required:
        - id
        - title
        - author
        - year
        - createdAt
        - summary
        - servedBy
    BookSummaryResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/BookSummary"
      required:
        - data
    MessageBrokerHealth:
      type: object
      properties:
        status:
          type: string
        transport:
          type: string
          example: rabbitmq
        queueName:
          type: string
        subscribers:
          type: integer
        pendingJobs:
          type: integer
        lastError:
          nullable: true
          type: string
      required:
        - status
        - transport
        - queueName
        - subscribers
        - pendingJobs
        - lastError
    MessageBrokerHealthResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/MessageBrokerHealth"
      required:
        - data
    NotificationEvent:
      type: object
      properties:
        id:
          type: string
        eventType:
          type: string
        source:
          type: string
        handledBy:
          type: string
        receivedAt:
          type: string
          format: date-time
        payloadSummary:
          type: string
      required:
        - id
        - eventType
        - source
        - handledBy
        - receivedAt
        - payloadSummary
    NotificationEventListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NotificationEvent"
      required:
        - data
    LoginInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - email
        - password
    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accessToken:
              type: string
            tokenType:
              type: string
              example: Bearer
            expiresInSeconds:
              type: integer
            user:
              type: object
              properties:
                email:
                  type: string
                role:
                  type: string
              required:
                - email
                - role
          required:
            - accessToken
            - tokenType
            - expiresInSeconds
            - user
      required:
        - data
