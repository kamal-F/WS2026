openapi: 3.0.3
info:
  title: WS2026 API
  version: 1.0.0
  description: Dokumentasi REST API untuk praktikum Web Service WS2026.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Health check service
      responses:
        "200":
          description: Service berjalan normal
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: ws2026-api
  /api/v1/books:
    get:
      summary: Ambil daftar buku
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Daftar buku berhasil diambil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"
    post:
      summary: Tambah buku baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "201":
          description: Buku berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "400":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/books/{id}:
    get:
      summary: Ambil detail buku
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detail buku berhasil diambil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "404":
          description: Buku tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Ubah data buku
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "200":
          description: Buku berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "400":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Buku tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Hapus buku
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Buku berhasil dihapus
        "404":
          description: Buku tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: string
        year:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - author
        - year
        - createdAt
    BookInput:
      type: object
      properties:
        title:
          type: string
          minLength: 3
        author:
          type: string
          minLength: 3
        year:
          type: integer
          minimum: 1900
      required:
        - title
        - author
        - year
    BookResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Book"
      required:
        - data
    BookListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
          required:
            - page
            - limit
            - total
      required:
        - data
        - meta
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
      required:
        - error
